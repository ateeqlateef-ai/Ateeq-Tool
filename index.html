<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        if (msg.includes('Script error')) return;
        
        var display = document.getElementById('boot-error');
        if (!display) {
          display = document.createElement('div');
          display.id = 'boot-error';
          display.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;color:#ff4444;padding:40px;z-index:99999;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;';
          document.body.appendChild(display);
        }
        
        display.innerHTML = 
          '<div style="max-width:600px;text-align:center;">' +
          '<h2 style="color:white;margin-bottom:10px;">[BOOT_ERROR]</h2>' +
          '<div style="background:#1a1a1a;padding:20px;border-radius:10px;text-align:left;border:1px solid #333;margin-bottom:20px;">' +
          '<pre style="white-space:pre-wrap;font-size:12px;color:#ff6666;">' + (error ? error.stack : msg) + '</pre>' +
          '</div>' +
          '<button onclick="location.reload()" style="background:#ff4444;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-weight:bold;">RELOAD_SYSTEM</button>' +
          '</div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
